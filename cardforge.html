<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CardForge — Digital Business Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--surface:#161616;--border:#2a2a2a;
  --accent:#c8f04d;--accent-dim:#a3c53a;--text:#f0ede8;--muted:#6e6e6e;
}
body{
  background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;
  min-height:100vh;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr auto;
}
header{
  grid-column:1/-1;padding:1.6rem 3rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:1rem;
}
header .logo{font-family:'DM Serif Display',serif;font-size:1.6rem;letter-spacing:-.02em;}
header .logo span{color:var(--accent);font-style:italic}
header p{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-left:auto;letter-spacing:.08em;text-transform:uppercase;}

.form-panel{
  padding:2.5rem 3rem;border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;gap:1.5rem;
}
.section-title{
  font-family:'DM Mono',monospace;font-size:.65rem;text-transform:uppercase;
  letter-spacing:.14em;color:var(--muted);margin-bottom:.6rem;
}
.field-group{display:flex;flex-direction:column;gap:1rem}
label{display:flex;flex-direction:column;gap:.35rem;font-size:.8rem;color:var(--muted);letter-spacing:.03em;}
input,textarea{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:.65rem .9rem;font-family:'Instrument Sans',sans-serif;
  font-size:.9rem;outline:none;width:100%;transition:border-color .2s,box-shadow .2s;
}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,240,77,.1);}
input.invalid{border-color:#ff7b7b}
textarea{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.field-error{font-size:.72rem;color:#ff7b7b;display:none;margin-top:2px}

/* Palettes */
.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,34px);gap:.5rem}
.palette-btn{
  width:34px;height:34px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:transform .15s,border-color .15s;position:relative;flex-shrink:0;
}
.palette-btn:hover{transform:scale(1.18)}
.palette-btn.active{border-color:white;box-shadow:0 0 0 3px rgba(255,255,255,.15)}
.palette-btn .tip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#1e1e1e;border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:.58rem;white-space:nowrap;
  padding:.2rem .45rem;border-radius:4px;pointer-events:none;opacity:0;
  transition:opacity .15s;z-index:10;
}
.palette-btn:hover .tip{opacity:1}

/* Avatar upload */
.avatar-upload{cursor:pointer}
.avatar-preview{
  width:88px;height:88px;border-radius:50%;
  border:2px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.3rem;color:var(--muted);font-size:.62rem;letter-spacing:.04em;
  transition:border-color .2s,color .2s;overflow:hidden;position:relative;
  background:var(--surface);
}
.avatar-preview:hover{border-color:var(--accent);color:var(--accent)}
.avatar-preview svg{width:26px;height:26px;opacity:.6}
.avatar-preview img{
  width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%;
}
.avatar-preview.has-image span,.avatar-preview.has-image svg{display:none}

/* Card avatar */
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.card-header-text{flex:1;min-width:0}
.card-avatar{
  width:64px;height:64px;border-radius:50%;object-fit:cover;
  flex-shrink:0;border:2px solid rgba(255,255,255,.15);
}


.extra-links-list{display:flex;flex-direction:column;gap:.6rem}
.extra-link-row{display:flex;gap:.5rem;align-items:center}
.extra-link-row input{flex:1}
.remove-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:.52rem .7rem;cursor:pointer;font-size:.82rem;
  transition:color .15s,border-color .15s;flex-shrink:0;line-height:1;
}
.remove-btn:hover{color:#ff7b7b;border-color:#ff7b7b}
.add-link-btn{
  background:var(--surface);border:1px dashed var(--border);color:var(--muted);
  border-radius:6px;padding:.6rem 1rem;cursor:pointer;font-size:.82rem;
  width:100%;text-align:left;transition:border-color .2s,color .2s;
  font-family:'Instrument Sans',sans-serif;
}
.add-link-btn:hover{border-color:var(--accent);color:var(--accent)}

.generate-btn{
  margin-top:.5rem;background:var(--accent);color:#0e0e0e;font-weight:600;
  font-size:.95rem;border:none;border-radius:8px;padding:.85rem 1.5rem;
  cursor:pointer;transition:background .2s,transform .1s;
}
.generate-btn:hover{background:var(--accent-dim)}
.generate-btn:active{transform:scale(.98)}

/* Preview */
.preview-panel{padding:2.5rem 3rem;display:flex;flex-direction:column;gap:1.5rem;overflow-y:auto;}
.preview-label{font-family:'DM Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);}
.card-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 0;}
.biz-card{
  width:420px;min-height:230px;border-radius:16px;padding:2.2rem 2.4rem;
  position:relative;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);
  transition:transform .3s ease,box-shadow .3s ease;
}
.biz-card:hover{transform:translateY(-6px) rotate(-.5deg);box-shadow:0 36px 100px rgba(0,0,0,.6);}
.card-dot{position:absolute;border-radius:50%;pointer-events:none;filter:blur(60px);}
.card-name{font-family:'DM Serif Display',serif;font-size:1.9rem;line-height:1.1;letter-spacing:-.02em;margin-bottom:.3rem;}
.card-title{font-size:.82rem;opacity:.65;font-weight:500;margin-bottom:1.2rem;letter-spacing:.04em;text-transform:uppercase;}
.card-bio{font-size:.82rem;line-height:1.55;opacity:.75;margin-bottom:1.4rem;max-width:28ch;}
.card-links{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center}
.card-link{
  display:inline-flex;align-items:center;gap:.35rem;font-family:'DM Mono',monospace;
  font-size:.7rem;padding:.3rem .65rem;border-radius:100px;text-decoration:none;
  font-weight:500;letter-spacing:.03em;transition:opacity .15s,transform .15s;
}
.card-link:hover{opacity:.75;transform:translateY(-1px)}
.card-link svg{width:12px;height:12px;flex-shrink:0;fill:currentColor}
.card-divider{width:32px;height:2px;border-radius:4px;margin:1rem 0;opacity:.8}

/* Actions */
.actions{display:flex;gap:.75rem}
.action-btn{
  flex:1;padding:.7rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:.85rem;cursor:pointer;
  transition:background .15s;font-family:'Instrument Sans',sans-serif;
}
.action-btn:hover{background:#222}
.action-btn.primary{background:var(--accent);color:#0e0e0e;border-color:var(--accent);font-weight:600;}
.action-btn.primary:hover{background:var(--accent-dim);border-color:var(--accent-dim)}

/* Footer */
footer{
  grid-column:1/-1;border-top:1px solid var(--border);
  padding:.85rem 3rem;display:flex;align-items:center;justify-content:flex-end;
}
footer a{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);text-decoration:none;letter-spacing:.08em;transition:color .2s;}
footer a:hover{color:var(--accent)}

@media(max-width:860px){
  body{grid-template-columns:1fr}
  .form-panel{border-right:none;border-bottom:1px solid var(--border)}
  .biz-card{width:100%;max-width:420px}
}
</style>
</head>

    <div class="palette-grid" id="palettes"></div>
  </div>

  <button class="generate-btn" id="gen-btn">✦ Generate Card</button>
</section>

<!-- ══════════ PREVIEW ══════════ -->
<section class="preview-panel">
  <p class="preview-label">Live Preview</p>
  <div class="card-stage">
    <div class="biz-card" id="card">

      <div class="card-dot" id="card-dot2" style="width:120px;height:120px;bottom:-20px;left:10px;opacity:.1;"></div>
      <div class="card-header">
        <div class="card-header-text">
          <div class="card-name" id="c-name"></div>
          <div class="card-title" id="c-title"></div>
        </div>
        <img class="card-avatar" id="c-avatar" src="" alt="Profile" style="display:none">
      </div>
      <div id="divider-container"></div>
      <div class="card-bio" id="c-bio"></div>
      <div class="card-links" id="c-links"></div>
    </div>
  </div>
  <div class="actions">
    <button class="action-btn primary" id="dl-btn">↓ Download Card</button>
  </div>
</section>

<footer>
  <a href="https://haunt.gg/gasp" target="_blank" rel="noopener noreferrer">haunt.gg/gasp</a>
</footer>

  { name:'Crimson Ink',     bg:'#100a0a', text:'#f5e0e0', accent:'#cc3333' },

  { name:'Pure Black',      bg:'#000000', text:'#ffffff', accent:'#ffffff' },
  { name:'Pure White',      bg:'#ffffff', text:'#000000', accent:'#000000' },
  { name:'Warm Gray',       bg:'#1c1c1c', text:'#e8e8e8', accent:'#c0c0c0' },
  { name:'Cool Gray',       bg:'#f5f5f5', text:'#1a1a1a', accent:'#555555' },
  { name:'Sepia',           bg:'#1a1510', text:'#f0e8d8', accent:'#d4a96a' },
  { name:'Chalk',           bg:'#fafafa', text:'#111111', accent:'#111111' },
  // Light
  { name:'Sage Concrete',   bg:'#f2f0ed', text:'#1a1a1a', accent:'#4a7c59' },
  { name:'Glacier',         bg:'#f0f4f8', text:'#1c2b3a', accent:'#0057ff' },
  { name:'Cream & Ink',     bg:'#f9f6f0', text:'#1c1a17', accent:'#8b3a2a' },
  { name:'Blush Paper',     bg:'#fdf0f0', text:'#2a1515', accent:'#d63a6e' },
  { name:'Mint Notepad',    bg:'#eef8f4', text:'#0f2a20', accent:'#1a8c5a' },
  { name:'Sunbleached',     bg:'#fdfaf2', text:'#2a2015', accent:'#c47e10' },
  { name:'Lavender Field',  bg:'#f5f0ff', text:'#1a1030', accent:'#6030c8' },
  { name:'Seafoam Press',   bg:'#eef8f8', text:'#0f2828', accent:'#0a7a7a' },
];

document.getElementById('palette-count').textContent = `— ${PALETTES.length} palettes`;

let currentPalette = 0;
let extraLinks = [];
let extraIdCounter = 0;
let avatarDataURL = null; // base64 data URL of the uploaded profile picture

// ── Avatar upload ─────────────────────────────────────────────────────────────
document.getElementById('avatar-upload').addEventListener('click', () => {
  document.getElementById('avatar-file').click();
});
document.getElementById('avatar-file').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    avatarDataURL = e.target.result;
    const preview = document.getElementById('avatar-preview');
    // Remove old img if any
    preview.querySelectorAll('img').forEach(i => i.remove());
    const img = document.createElement('img');
    img.src = avatarDataURL;
    preview.appendChild(img);
    preview.classList.add('has-image');
    generateCard();
  };
  reader.readAsDataURL(file);
});

// ── Utils ─────────────────────────────────────────────────────────────────────
const esc = str => String(str).replace(/[&<>"']/g, m =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const val = id => document.getElementById(id).value.trim();
const normalise = url => (!url ? '' : /^https?:\/\//i.test(url) ? url : 'https://' + url);

function strip(raw, patterns) {
  let s = raw.replace(/^@/, '');
  for (const p of patterns) s = s.replace(p, '');
  return s.split('/')[0].split('?')[0];
}
const githubUser   = r => strip(r, [/^(?:https?:\/\/)?(?:www\.)?github\.com\//i]);
const linkedinH    = r => strip(r, [/^(?:https?:\/\/)?(?:www\.)?linkedin\.com\/in\//i]).replace(/\/$/, '');
const twitterH     = r => strip(r, [/^(?:https?:\/\/)?(?:www\.)?(?:twitter|x)\.com\//i]);
const instagramH   = r => strip(r, [/^(?:https?:\/\/)?(?:www\.)?instagram\.com\//i]);

function detectIcon(url) {
  const u = url.toLowerCase();
  if (u.includes('github'))    return 'github';
  if (u.includes('linkedin'))  return 'linkedin';
  if (u.includes('twitter') || u.includes('x.com')) return 'twitter';
  if (u.includes('instagram')) return 'instagram';
  if (u.includes('youtube') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('tiktok'))    return 'tiktok';
  if (u.includes('dribbble'))  return 'dribbble';
  return 'link';
}

// ── Validation ─────────────────────────────────────────────────────────────────
const validEmail   = e => !e || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
const validWebsite = u => { if (!u) return true; try { new URL(normalise(u)); return true; } catch { return false; } };

function setFieldValidity(inputId, errorId, ok) {
  document.getElementById(inputId).classList.toggle('invalid', !ok);
  document.getElementById(errorId).style.display = ok ? 'none' : 'block';
}
function validateAll() {
  const eOK = validEmail(val('email')), wOK = validWebsite(val('website'));
  setFieldValidity('email', 'email-error', eOK);
  setFieldValidity('website', 'website-error', wOK);
  return eOK && wOK;
}

// ── Extra links UI ────────────────────────────────────────────────────────────
document.getElementById('add-link-btn').addEventListener('click', () => addExtraLink());

function addExtraLink(url = '') {
  const id = ++extraIdCounter;
  extraLinks.push({ id, url });
  const list = document.getElementById('extra-links-list');
  const row = document.createElement('div');
  row.className = 'extra-link-row';
  row.dataset.id = id;

  const inp = document.createElement('input');
  inp.type = 'url'; inp.placeholder = 'https://'; inp.value = url;
  inp.addEventListener('input', () => {
    const e = extraLinks.find(l => l.id === id);
    if (e) e.url = inp.value.trim();
    generateCard();
  });

  const del = document.createElement('button');
  del.className = 'remove-btn'; del.textContent = '✕'; del.setAttribute('aria-label', 'Remove');
  del.addEventListener('click', () => {
    extraLinks = extraLinks.filter(l => l.id !== id);
    row.remove(); generateCard();
  });

  row.appendChild(inp); row.appendChild(del);
  list.appendChild(row);
  inp.focus();
  generateCard();
}

// ── Palette grid ──────────────────────────────────────────────────────────────
const paletteGrid = document.getElementById('palettes');
PALETTES.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'palette-btn' + (i === 0 ? ' active' : '');
  btn.style.background = p.accent;
  btn.setAttribute('aria-label', p.name);
  const tip = document.createElement('span');
  tip.className = 'tip'; tip.textContent = p.name;
  btn.appendChild(tip);
  btn.addEventListener('click', () => {
    currentPalette = i;
    document.querySelectorAll('.palette-btn').forEach((b, j) => b.classList.toggle('active', j === i));
    generateCard();
  });
  paletteGrid.appendChild(btn);
});

// ── Build link data ───────────────────────────────────────────────────────────
function buildLinks() {
  const links = [];
  const e  = val('email'),    w  = val('website'),
        gh = val('github'),   li = val('linkedin'),
        tw = val('twitter'),  ig = val('instagram');

  if (e)  links.push({ icon:'email',    label: e,                        href: 'mailto:' + e });
  if (w)  links.push({ icon:'website',  label: w,                        href: normalise(w) });
  if (gh) links.push({ icon:'github',   label: githubUser(gh),           href: 'https://github.com/'      + githubUser(gh) });
  if (li) links.push({ icon:'linkedin', label: linkedinH(li),            href: 'https://linkedin.com/in/' + linkedinH(li) });
  if (tw) links.push({ icon:'twitter',  label: '@' + twitterH(tw),       href: 'https://x.com/'           + twitterH(tw) });
  if (ig) links.push({ icon:'instagram',label: '@' + instagramH(ig),     href: 'https://instagram.com/'   + instagramH(ig) });

  extraLinks.forEach(l => {
    if (l.url) links.push({ icon: detectIcon(l.url), label: l.url.replace(/^https?:\/\//,''), href: normalise(l.url) });
  });
  return links;
}

// ── Generate preview ──────────────────────────────────────────────────────────
function generateCard() {
  if (!validateAll()) return;
  const p = PALETTES[currentPalette];

  const name  = [val('fname'), val('lname')].filter(Boolean).join(' ') || 'Your Name';
  const title = val('job-title');
  const bio   = val('bio');

  document.getElementById('c-name').textContent  = name;
  document.getElementById('c-title').textContent = title;
  document.getElementById('c-bio').textContent   = bio;

  // Avatar
  const avatarEl = document.getElementById('c-avatar');
  if (avatarDataURL) {
    avatarEl.src = avatarDataURL;
    avatarEl.style.display = 'block';
    avatarEl.style.borderColor = p.accent + '55';
  } else {
    avatarEl.style.display = 'none';
  }

  const card = document.getElementById('card');
  card.style.background = p.bg;
  card.style.color = p.text;
  document.getElementById('card-dot').style.background  = p.accent;
  document.getElementById('card-dot2').style.background = p.accent;

  document.getElementById('divider-container').innerHTML =
    (title || bio) ? `<div class="card-divider" style="background:${p.accent}"></div>` : '';

  const linksEl = document.getElementById('c-links');
  linksEl.innerHTML = '';
  buildLinks().forEach(l => {
    const a = document.createElement('a');
    a.href = l.href; a.className = 'card-link';
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.style.background = p.accent + '20';
    a.style.color = p.accent;
    a.style.border = `1px solid ${p.accent}50`;
    a.innerHTML = ICONS[l.icon] + esc(l.label);
    linksEl.appendChild(a);
  });
}

// ── Export ────────────────────────────────────────────────────────────────────
function buildExportHTML() {
  const p     = PALETTES[currentPalette];
  const name  = esc([val('fname'), val('lname')].filter(Boolean).join(' ') || 'Your Name');
  const title = esc(val('job-title'));
  const bio   = esc(val('bio'));
  const links = buildLinks();

  const iconSVG = key => ICONS[key] || ICONS.link;

  const linksHTML = links.map(l =>
    `<a href="${esc(l.href)}" target="_blank" rel="noopener noreferrer" class="card-link">${iconSVG(l.icon)}${esc(l.label)}</a>`
  ).join('\n        ');

  const divHTML = (title || bio)
    ? `<div style="width:32px;height:2px;border-radius:4px;margin:1rem 0;background:${esc(p.accent)};opacity:.8;"></div>`
    : '';

  const avatarHTML = avatarDataURL
    ? `<img src="${avatarDataURL}" alt="Profile" style="width:64px;height:64px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid ${esc(p.accent)}55;">`
    : '';

  return `<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${name}</title>

    .biz-card:hover{transform:translateY(-6px) rotate(-.5deg);box-shadow:0 36px 100px rgba(0,0,0,.6);}
    .dot{position:absolute;border-radius:50%;pointer-events:none;filter:blur(60px);}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
    .card-header-text{flex:1;min-width:0;}
    .card-name{font-family:'DM Serif Display',serif;font-size:1.9rem;line-height:1.1;letter-spacing:-.02em;margin-bottom:.3rem;}
    .card-title{font-size:.82rem;opacity:.65;font-weight:500;margin-bottom:1.2rem;letter-spacing:.04em;text-transform:uppercase;}
    .card-bio{font-size:.82rem;line-height:1.55;opacity:.75;margin-bottom:1.4rem;max-width:28ch;}

    .card-link:hover{opacity:.75;transform:translateY(-1px);}

    footer a{font-family:'DM Mono',monospace;font-size:.65rem;color:#6e6e6e;text-decoration:none;letter-spacing:.08em;transition:color .2s;}
    footer a:hover{color:${esc(p.accent)}}
  </style>
</head>
<body>
  <div class="biz-card" style="background:${esc(p.bg)};color:${esc(p.text)};">
    <div class="dot" style="width:180px;height:180px;top:-40px;right:-30px;opacity:.18;background:${esc(p.accent)};"></div>
    <div class="dot" style="width:120px;height:120px;bottom:-20px;left:10px;opacity:.1;background:${esc(p.accent)};"></div>
    <div class="card-header">
      <div class="card-header-text">
        <div class="card-name">${name}</div>
        ${title ? `<div class="card-title">${title}</div>` : ''}
      </div>
      ${avatarHTML}
    </div>
    ${divHTML}
    ${bio   ? `<div class="card-bio">${bio}</div>`   : ''}
    ${links.length ? `<div class="card-links">\n        ${linksHTML}\n      </div>` : ''}
  </div>
  <footer><a href="https://haunt.gg/gasp" target="_blank" rel="noopener noreferrer">haunt.gg/gasp</a></footer>
</body>
</html>`;
}

document.getElementById('dl-btn').addEventListener('click', function() {
  if (!validateAll()) return;
  const blob = new Blob([buildExportHTML()], { type:'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href:url, download:'business-card.html' });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10_000);
});

// Live update
document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', generateCard));

// Init
generateCard();
</script>
</body>
